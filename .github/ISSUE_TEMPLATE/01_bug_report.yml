name: Bug report
description: Something breaks in a game, the runner, or repo tooling
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail to reproduce. For game bugs, paste the exact `run_game.py` command from [CONTRIBUTING.md](https://github.com/theredbluepill/arc-interactive/blob/main/CONTRIBUTING.md#running-games).

  - type: input
    id: game_id
    attributes:
      label: Game ID (if applicable)
      description: Leave empty for non-game issues (e.g. CI, docs only).
      placeholder: e.g. ez01
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Game version
      placeholder: e.g. v1
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Short summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps, including CLI commands if relevant.
      placeholder: |
        1. `uv run python run_game.py --game … --version v1`
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      placeholder: |
        **Expected:** …
        **Actual:** …
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: OS, Python version, `uv` version if you know them.
      placeholder: macOS 15, Python 3.12, uv 0.x
    validations:
      required: false
