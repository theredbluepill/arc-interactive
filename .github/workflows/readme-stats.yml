# Refreshes README badge row (game count + contribute link).
name: README statistics

on:
  push:
    branches: [main]
    paths:
      - "GAMES.md"
      - "devtools/scripts/update_readme_stats.py"
      - ".github/workflows/readme-stats.yml"
  workflow_dispatch:

concurrency:
  group: readme-stats-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate README stats
        run: python3 devtools/scripts/update_readme_stats.py

      # main is protected (PR-only). Open/update a bot branch PR instead of pushing to main.
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: refresh README game stats [skip ci]"
          branch: bot/readme-stats
          title: "chore: refresh README game stats"
          body: |
            Automated README refresh from `devtools/scripts/update_readme_stats.py` (e.g. game count).

            **Merge this PR** to update `main` — direct pushes are blocked by repository rules.
          delete-branch: false
